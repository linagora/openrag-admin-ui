services:
  indexer-ui:
    build: 
      context: .
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL}
        - VITE_INCLUDE_CREDENTIALS=${VITE_INCLUDE_CREDENTIALS}
    environment:
      - DEFAULT_LANGUAGE=${DEFAULT_LANGUAGE:-}
    ports:
      - "${INDEXERUI_PORT:-3042}:3000"
    restart: unless-stopped